<!doctype html>

<html>
  <head>
    <title>OTP Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body
    class="bg-gradient-to-br from-gray-200 via-gray-300 to-gray-400 min-h-screen flex items-center justify-center"
  >
    <div
      class="bg-white shadow-2xl rounded-2xl w-full max-w-md p-10 border border-gray-200"
    >
      
      <h2 class="text-2xl font-bold text-center text-gray-700 mb-6">
        OTP Verification
      </h2>

      <p class="text-gray-500 text-center mb-6">
        Enter the OTP sent to your phone number
      </p>

      <!-- Django Messages
      {% if messages %}
        {% for message in messages %}
          <div class="bg-red-100 text-red-700 p-2 rounded mb-4 text-center">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %} -->

      <form method="POST" action="/account/otp_verification/">
        {% csrf_token %}

        <!-- OTP Field -->
        <div class="mb-5">
          <label class="block text-gray-600 mb-2 font-medium">
            Enter OTP
          </label>

          <input
            type="text"
            name="otp"
            maxlength="6"
            placeholder="Enter 6 digit OTP"
            class="w-full border border-gray-300 rounded-lg p-3 shadow-sm focus:ring-2 focus:ring-indigo-400 focus:outline-none text-center tracking-widest text-lg"
            required
          />
        </div>

        <!-- Verify Button -->
        <button
          type="submit"
          class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-3 rounded-lg transition duration-200"
        >
          Verify OTP
        </button>
      </form>

      <!-- <div class="text-center mt-5">
        <a
          href=""
          class="text-indigo-500 hover:underline text-sm"
        >
          Resend OTP
        </a>
      </div> -->

    </div>
  </body>
</html>
